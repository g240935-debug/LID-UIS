<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LID - Tutor Estadístico UIS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Tutor LID: Análisis Bivariado</h1>
            <p>Compañero, analicemos juntos estos datos de la UIS.</p>
        </header>

        <div id="visualizer-container">
            <div id="tabla-container"></div>
            <canvas id="miGrafico" style="display:none; max-width: 100%; margin: 20px 0;"></canvas>
        </div>

        <main id="chat-container">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Escribe tu respuesta...">
                <button onclick="enviarMensaje()">Enviar</button>
            </div>
            
            <button id="btn-toggle" onclick="toggleVisualizacion()" style="display:none; width: 100%; margin-top: 10px; background: #6c757d;">Ver Gráfico / Tabla</button>
            <button id="btn-cambio-rep" onclick="solicitarCambioRepresentacion()" style="display:none; width: 100%; margin-top: 10px; background: #28a745;">Cambiar a Proporciones 📈</button>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
